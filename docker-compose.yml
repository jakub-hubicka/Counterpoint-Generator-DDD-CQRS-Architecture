services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: counterpoint_ddd_php
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
    environment:
      - APP_ENV=dev
      - APP_URL=http://localhost:8080
      - DATABASE_URL=postgresql://counterpoint:counterpoint@postgres:5432/counterpoint?serverVersion=16&charset=utf8
    networks:
      - counterpoint_ddd

  nginx:
    image: nginx:1.25-alpine
    container_name: counterpoint_ddd_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - counterpoint_ddd

  postgres:
    image: postgres:16-alpine
    container_name: counterpoint_ddd_postgres
    environment:
      POSTGRES_DB: counterpoint
      POSTGRES_USER: counterpoint
      POSTGRES_PASSWORD: counterpoint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_ddd:/var/lib/postgresql/data
    networks:
      - counterpoint_ddd

volumes:
  postgres_data_ddd:

networks:
  counterpoint_ddd:
    driver: bridge
