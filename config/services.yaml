# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Repository aliases: interface -> Doctrine implementation
    App\Composition\Domain\Repository\VoiceRepositoryInterface:
        alias: App\Composition\Infrastructure\Persistence\DoctrineVoiceRepository

    App\Composition\Domain\Repository\CantusFirmusRepositoryInterface:
        alias: App\Composition\Infrastructure\Persistence\DoctrineCantusFirmusRepository

    # Tag all counterpoint rules for injection into the analyzer
    App\Composition\Domain\Rule\ParallelFifthsRule:
        tags: ['app.counterpoint_rule']
    App\Composition\Domain\Rule\ParallelOctavesRule:
        tags: ['app.counterpoint_rule']
    App\Composition\Domain\Rule\VoiceLeadingRule:
        tags: ['app.counterpoint_rule']
    App\Composition\Domain\Rule\DissonanceResolutionRule:
        tags: ['app.counterpoint_rule']

    # Inject tagged rules into the analyzer
    App\Analysis\Domain\Service\CounterpointAnalyzer:
        arguments:
            $rules: !tagged_iterator 'app.counterpoint_rule'
